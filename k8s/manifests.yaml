# ── BACKEND ──────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: va-locator-backend
  namespace: va-locator
  labels:
    app: va-locator-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: va-locator-backend
  template:
    metadata:
      labels:
        app: va-locator-backend
    spec:
      containers:
        - name: backend
          image: <YOUR_OCI_REGION>.ocir.io/<YOUR_TENANCY>/va-locator-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: VA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: va-api-secret
                  key: api-key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: va-locator-backend
  namespace: va-locator
spec:
  selector:
    app: va-locator-backend
  ports:
    - port: 3001
      targetPort: 3001

---
# ── FRONTEND ─────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: va-locator-frontend
  namespace: va-locator
  labels:
    app: va-locator-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: va-locator-frontend
  template:
    metadata:
      labels:
        app: va-locator-frontend
    spec:
      containers:
        - name: frontend
          image: <YOUR_OCI_REGION>.ocir.io/<YOUR_TENANCY>/va-locator-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: va-locator-frontend
  namespace: va-locator
  annotations:
    service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "100"
spec:
  type: LoadBalancer
  selector:
    app: va-locator-frontend
  ports:
    - port: 80
      targetPort: 80

---
# ── NAMESPACE + SECRET ───────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: va-locator
---
apiVersion: v1
kind: Secret
metadata:
  name: va-api-secret
  namespace: va-locator
type: Opaque
stringData:
  api-key: "REPLACE_WITH_VA_API_KEY"
